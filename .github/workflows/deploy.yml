name: Deploy EC2

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, destroy]
      stack_name:
        description: 'CloudFormation stack name'
        required: true
      instance_type:
        description: 'Instance type'
        required: false
        default: 't3.small'
        type: choice
        options: [t3.micro, t3.small, t3.medium]
      os:
        description: 'Base OS (x86_64, latest)'
        required: true
        default: 'amazon-linux'
        type: choice
        options: [amazon-linux, ubuntu, rhel9]
      ami_id:
        description: 'Override AMI ID (leave blank to use the OS default)'
        required: false
        default: ''

env:
  AWS_REGION: eu-west-1
  TEMPLATE_PATH: iac/template.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AMI
        if: ${{ inputs.action == 'deploy' }}
        id: ami
        run: |
          # Pinned defaults for eu-west-1, x86_64. Update manually to bump images.
          case "${{ inputs.os }}" in
            amazon-linux) DEFAULT_AMI=ami-03a25ed280b358f5b
                          OS_VERSION="Amazon Linux 2023 (al2023-ami-2023.11.20260509.0-kernel-6.1-x86_64)" ;;
            ubuntu)       DEFAULT_AMI=ami-0354b051078d198b4
                          OS_VERSION="Ubuntu 24.04 LTS (ubuntu-noble-24.04-amd64-server-20260424)" ;;
            rhel9)        DEFAULT_AMI=ami-04af76ffc52a7b0ad
                          OS_VERSION="RHEL 9.8.0 (RHEL-9.8.0_HVM_GA-20260521-x86_64-0-Hourly2-GP3)" ;;
          esac
          AMI_ID="${{ inputs.ami_id }}"
          if [ -z "$AMI_ID" ]; then
            AMI_ID="$DEFAULT_AMI"
          else
            OS_VERSION="$OS_VERSION — overridden AMI"
          fi
          echo "OS:  ${{ inputs.os }} — $OS_VERSION"
          echo "AMI: $AMI_ID"
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          {
            echo "## Deploying EC2"
            echo "- **OS**: ${{ inputs.os }} ($OS_VERSION)"
            echo "- **AMI**: $AMI_ID"
            echo "- **Instance type**: ${{ inputs.instance_type }}"
            echo "- **Stack**: ${{ inputs.stack_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy stack
        if: ${{ inputs.action == 'deploy' }}
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ inputs.stack_name }}
          template: ${{ env.TEMPLATE_PATH }}
          capabilities: CAPABILITY_IAM,CAPABILITY_NAMED_IAM
          parameter-overrides: "InstanceType=${{ inputs.instance_type }},ImageId=${{ steps.ami.outputs.ami_id }}"
          no-fail-on-empty-changeset: '1'

      - name: Destroy stack
        if: ${{ inputs.action == 'destroy' }}
        run: |
          aws cloudformation delete-stack \
            --stack-name "${{ inputs.stack_name }}" \
            --region "${{ env.AWS_REGION }}"
          aws cloudformation wait stack-delete-complete \
            --stack-name "${{ inputs.stack_name }}" \
            --region "${{ env.AWS_REGION }}"
